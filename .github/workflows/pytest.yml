name: Pytest
permissions:
    contents: read

on:
    pull_request:
        branches:
            - main # This workflow will run for PRs targeting the main branch

jobs:
    pytest-core:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - python-version: "3.11"
                      extras: "--all-extras"
                    - python-version: "3.12"
                      extras: "--all-extras"
                    - python-version: "3.13"
                      extras: "--all-extras"
                    - python-version: "3.14"
                      extras: ""
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install the latest version of uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                  python-version: ${{ matrix.python-version }}
                  enable-cache: true

            - name: Install dependencies with uv
              run: |
                  uv sync ${{ matrix.extras }} --frozen

            - name: Run core tests
              run: |
                  uv run pytest -m "not (bq or docs or slow)"

    pytest-others:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version:
                    - "3.11"
                    - "3.12"
                    - "3.13"
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install the latest version of uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                  python-version: ${{ matrix.python-version }}
                  enable-cache: true

            - name: Install dependencies with uv
              run: |
                  uv sync --all-extras --frozen

            - name: Run non-core tests
              run: |
                  uv run pytest -m "bq or docs or slow"
